name: Fortress CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
  VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

jobs:
  build:
    name: TypeScript & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: TypeScript check
        run: npx tsc --noEmit
      - name: Build
        run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  lint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx eslint src/ --max-warnings 999

  guard:
    name: Critical File Guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify watchdog + health hooks exist
        run: |
          for f in src/hooks/useFortressHealth.ts src/hooks/useSystemHealth.tsx src/hooks/useSystemTestRun.ts src/hooks/useReliability.ts src/hooks/useSignalQuality.ts src/hooks/useErrorNotifications.tsx src/hooks/useAuth.tsx src/hooks/useTenant.tsx src/lib/testing/systemTestRunManager.ts src/lib/testing/e2eTests.ts; do
            if [ ! -f "$f" ]; then
              echo "CRITICAL FILE MISSING: $f"
              exit 1
            fi
            echo "OK $f"
          done
      - name: No service_role key in frontend
        run: |
          if grep -r "service_role" src/hooks/ src/contexts/ src/lib/ 2>/dev/null; then
            echo "service_role key found in frontend"
            exit 1
          fi
          echo "No service_role leak"
      - name: No vip_id references
        run: |
          COUNT=$(grep -r "vip_id" src/ --include="*.ts" --include="*.tsx" 2>/dev/null | wc -l)
          [ "$COUNT" -gt "0" ] && echo "WARNING: $COUNT vip_id references found"
          exit 0

  health-gate:
    name: Live System Health Gate
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Query system-ops health-check
        run: |
          RESPONSE=$(curl -s --max-time 30 -X POST -H "Content-Type: application/json" -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" "${{ secrets.VITE_SUPABASE_URL }}/functions/v1/system-ops" -d '{"action":"health-check"}')
          echo "Response: $RESPONSE"
          STATUS=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('overall_status','unknown'))" 2>/dev/null || echo "unknown")
          echo "Status: $STATUS"
          [ "$STATUS" = "unhealthy" ] && echo "WARNING: platform unhealthy" && exit 0
          echo "Health gate passed"

  loop-health:
    name: Fortress Loop Activity Check
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Check loop activity via Supabase
        run: |
          NOW_MINUS_24H=$(date -u -d '24 hours ago' +%Y-%m-%dT%H:%M:%SZ 2>/dev/null || date -u -v-24H +%Y-%m-%dT%H:%M:%SZ)
          check() { curl -s -H "apikey: ${{ secrets.VITE_SUPABASE_ANON_KEY }}" -H "Authorization: Bearer ${{ secrets.VITE_SUPABASE_ANON_KEY }}" "${{ secrets.VITE_SUPABASE_URL }}/rest/v1/$1?select=id&$2=gte.$NOW_MINUS_24H&limit=1" | python3 -c "import sys,json; print(len(json.load(sys.stdin)))" 2>/dev/null || echo 0; }
          W=$(check watchdog_learnings created_at)
          O=$(check autonomous_actions_log created_at)
          A=$(check ai_assistant_messages created_at)
          S=$(check autonomous_scan_results created_at)
          echo "Loops (24h): watchdog=$W ooda=$O aegis=$A scans=$S"
          IDLE=0
          [ "$W" = "0" ] && IDLE=$((IDLE+1))
          [ "$O" = "0" ] && IDLE=$((IDLE+1))
          [ "$A" = "0" ] && IDLE=$((IDLE+1))
          [ "$S" = "0" ] && IDLE=$((IDLE+1))
          [ "$IDLE" -ge "3" ] && echo "3+ loops idle - check cron jobs" && exit 1
          echo "Core loops active"

  pipeline-smoke:
    name: Pipeline Smoke Tests
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Trigger pipeline tests
        run: |
          RESPONSE=$(curl -s --max-time 120 -X POST -H "Content-Type: application/json" -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" "${{ secrets.VITE_SUPABASE_URL }}/functions/v1/system-ops" -d '{"action":"pipeline-tests"}')
          echo "$RESPONSE" | python3 -c "
          import sys,json
          try:
            d=json.load(sys.stdin)
            r=d.get('results',[])
            p=sum(1 for x in r if x.get('status')=='pass')
            f=sum(1 for x in r if x.get('status')=='fail')
            print(f'Passed: {p}  Failed: {f}  Total: {len(r)}')
            [print(('OK' if x.get('status')=='pass' else 'FAIL')+' '+x.get('test_name','?')) for x in r]
            sys.exit(1) if f>0 else None
          except Exception as e: print('parse error:',e)
          " 2>&1 || echo "Pipeline errors - check logs"

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Run Playwright tests
        run: npx playwright test
        env:
          CI: true
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
          TEST_ADMIN_EMAIL: ${{ secrets.TEST_ADMIN_EMAIL }}
          TEST_ADMIN_PASSWORD: ${{ secrets.TEST_ADMIN_PASSWORD }}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
